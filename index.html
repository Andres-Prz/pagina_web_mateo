 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Juego del dinosaurio</title>

    <style>
        body {
            margin: 0;
            padding: 40px 0;
            background: #ececec;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .dino-game {
            position: relative;
            width: 800px;
            max-width: 95%;
            height: 250px;
            margin: 30px auto;
            overflow: hidden;
            border: 2px solid #333;
            background: white;
            user-select: none;
            cursor: pointer;
        }

        #score {
            position: absolute;
            top: 15px;
            right: 20px;
            font-family: monospace;
            font-size: 18px;
            z-index: 10;
        }

        #dinosaurio {
            position: absolute;
            left: 50px;
            bottom: 20px;
            width: 55px;
            height: 55px;
            font-size: 48px;
            line-height: 55px;
            z-index: 2;
        }

        #cactus {
            position: absolute;
            right: -60px;
            bottom: 20px;
            width: 45px;
            height: 55px;
            font-size: 45px;
            line-height: 55px;
            animation: moverCactus 1.8s linear infinite;
            z-index: 2;
        }

        .suelo {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 18px;
            height: 2px;
            background: #333;
        }

        .instrucciones {
            text-align: center;
        }

        .saltando {
            animation: salto 600ms ease-out;
        }

        .juego-detenido #cactus {
            animation-play-state: paused;
        }

        @keyframes salto {
            0% {
                bottom: 20px;
            }

            45% {
                bottom: 135px;
            }

            55% {
                bottom: 135px;
            }

            100% {
                bottom: 20px;
            }
        }

        @keyframes moverCactus {
            from {
                right: -60px;
            }

            to {
                right: 850px;
            }
        }
    </style>
</head>

<body>

    <h1>Juego del dinosaurio</h1>

    <div class="dino-game" id="dinoGame">
        <div id="score">Puntos: 0</div>

        <div id="dinosaurio">🦖</div>
        <div id="cactus">🌵</div>

        <div class="suelo"></div>
    </div>

    <p class="instrucciones">
        Presiona espacio, flecha arriba o haz clic para saltar.
    </p>

    <script>
        (function () {
            const juego = document.getElementById("dinoGame");
            const dinosaurio = document.getElementById("dinosaurio");
            const cactus = document.getElementById("cactus");
            const marcador = document.getElementById("score");

            let saltando = false;
            let juegoTerminado = false;
            let puntos = 0;

            function saltar() {
                if (juegoTerminado) {
                    reiniciarJuego();
                    return;
                }

                if (saltando) {
                    return;
                }

                saltando = true;
                dinosaurio.classList.add("saltando");

                setTimeout(function () {
                    dinosaurio.classList.remove("saltando");
                    saltando = false;
                }, 600);
            }

            function reiniciarJuego() {
                juegoTerminado = false;
                puntos = 0;

                marcador.textContent = "Puntos: 0";
                dinosaurio.textContent = "🦖";
                juego.classList.remove("juego-detenido");

                cactus.style.animation = "none";
                void cactus.offsetWidth;
                cactus.style.animation = "moverCactus 1.8s linear infinite";
            }

            function detectarColision() {
                const rectDino = dinosaurio.getBoundingClientRect();
                const rectCactus = cactus.getBoundingClientRect();

                const margen = 12;

                const colision =
                    rectDino.right - margen > rectCactus.left &&
                    rectDino.left + margen < rectCactus.right &&
                    rectDino.bottom - margen > rectCactus.top;

                if (colision) {
                    juegoTerminado = true;
                    juego.classList.add("juego-detenido");

                    dinosaurio.textContent = "💀";
                    marcador.textContent = "Perdiste — clic para reiniciar";
                }
            }

            document.addEventListener("keydown", function (evento) {
                if (
                    evento.code === "Space" ||
                    evento.code === "ArrowUp"
                ) {
                    evento.preventDefault();
                    saltar();
                }
            });

            juego.addEventListener("click", saltar);

            setInterval(function () {
                if (!juegoTerminado) {
                    puntos++;
                    marcador.textContent = "Puntos: " + puntos;
                    detectarColision();
                }
            }, 100);
        })();
    </script>

</body>
</html>
